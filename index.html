<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>漂流瓶 - 匿名社交</title>
<style>
  :root {
    --primary: #6C5CE7;
    --primary-light: #A29BFE;
    --primary-dark: #5A4BD1;
    --accent: #00CEC9;
    --accent-light: #81ECEC;
    --bg: #0F0F1A;
    --bg-card: #1A1A2E;
    --bg-card-hover: #222240;
    --bg-input: #16162B;
    --text: #E8E8F0;
    --text-secondary: #9999B3;
    --text-muted: #666680;
    --border: #2A2A45;
    --danger: #FF6B6B;
    --danger-light: #FF8E8E;
    --warning: #FDCB6E;
    --success: #00B894;
    --glass: rgba(26, 26, 46, 0.85);
    --shadow: 0 8px 32px rgba(0,0,0,0.3);
    --radius: 16px;
    --radius-sm: 10px;
    --radius-xs: 6px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Background Animation */
  .bg-ocean {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    z-index: 0; pointer-events: none; overflow: hidden;
  }
  .bubble {
    position: absolute; border-radius: 50%;
    background: radial-gradient(circle at 30% 30%, rgba(108,92,231,0.15), rgba(0,206,201,0.08));
    animation: float-up linear infinite;
  }
  @keyframes float-up {
    0% { transform: translateY(100vh) scale(0); opacity: 0; }
    10% { opacity: 1; }
    90% { opacity: 1; }
    100% { transform: translateY(-10vh) scale(1); opacity: 0; }
  }

  /* App Container */
  .app {
    position: relative; z-index: 1;
    max-width: 480px; margin: 0 auto;
    min-height: 100vh;
    display: flex; flex-direction: column;
  }

  /* Header */
  .header {
    padding: 16px 20px;
    display: flex; align-items: center; justify-content: space-between;
    background: var(--glass);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
    position: sticky; top: 0; z-index: 100;
  }
  .header-title {
    font-size: 22px; font-weight: 700;
    background: linear-gradient(135deg, var(--primary-light), var(--accent));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .header-actions { display: flex; gap: 8px; }
  .icon-btn {
    width: 40px; height: 40px; border-radius: 50%;
    border: none; background: var(--bg-card);
    color: var(--text); font-size: 18px;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    transition: all 0.2s;
  }
  .icon-btn:hover { background: var(--primary); transform: scale(1.05); }
  .icon-btn.active { background: var(--primary); }

  /* Pages */
  .page { display: none; flex: 1; padding-bottom: 70px; }
  .page.active { display: block; }

  /* Login Page */
  .login-page {
    display: flex; flex-direction: column; align-items: center;
    justify-content: center; min-height: 100vh; padding: 40px 20px;
    padding-bottom: 40px;
  }
  .login-logo {
    width: 100px; height: 100px; border-radius: 50%;
    background: linear-gradient(135deg, var(--primary), var(--accent));
    display: flex; align-items: center; justify-content: center;
    font-size: 48px; margin-bottom: 24px;
    box-shadow: 0 0 40px rgba(108,92,231,0.3);
    animation: pulse-glow 3s ease-in-out infinite;
  }
  @keyframes pulse-glow {
    0%, 100% { box-shadow: 0 0 40px rgba(108,92,231,0.3); }
    50% { box-shadow: 0 0 60px rgba(108,92,231,0.5); }
  }
  .login-title { font-size: 28px; font-weight: 700; margin-bottom: 8px; }
  .login-subtitle { color: var(--text-secondary); margin-bottom: 32px; text-align: center; }
  .login-form { width: 100%; max-width: 360px; }
  .form-group { margin-bottom: 16px; }
  .form-label { display: block; font-size: 13px; color: var(--text-secondary); margin-bottom: 6px; }
  .form-input {
    width: 100%; padding: 14px 16px; border-radius: var(--radius-sm);
    border: 1px solid var(--border); background: var(--bg-input);
    color: var(--text); font-size: 15px; outline: none;
    transition: border-color 0.2s;
  }
  .form-input:focus { border-color: var(--primary); }
  .form-input::placeholder { color: var(--text-muted); }
  .btn {
    width: 100%; padding: 14px; border-radius: var(--radius-sm);
    border: none; font-size: 16px; font-weight: 600;
    cursor: pointer; transition: all 0.2s; display: flex;
    align-items: center; justify-content: center; gap: 8px;
  }
  .btn-primary {
    background: linear-gradient(135deg, var(--primary), var(--primary-dark));
    color: white;
  }
  .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 4px 20px rgba(108,92,231,0.4); }
  .btn-secondary {
    background: var(--bg-card); color: var(--text); border: 1px solid var(--border);
  }
  .btn-secondary:hover { border-color: var(--primary); }
  .btn-danger { background: var(--danger); color: white; }
  .btn-danger:hover { background: var(--danger-light); }
  .btn-sm { padding: 8px 16px; font-size: 13px; width: auto; }
  .btn-icon { width: auto; padding: 8px 14px; }

  /* Tab Navigation */
  .tab-nav {
    position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
    width: 100%; max-width: 480px;
    display: flex; background: var(--glass);
    backdrop-filter: blur(20px);
    border-top: 1px solid var(--border);
    z-index: 100; padding: 6px 0;
    padding-bottom: max(6px, env(safe-area-inset-bottom));
  }
  .tab-item {
    flex: 1; display: flex; flex-direction: column;
    align-items: center; gap: 2px; padding: 8px 0;
    border: none; background: none; color: var(--text-muted);
    font-size: 11px; cursor: pointer; transition: all 0.2s;
  }
  .tab-item .tab-icon { font-size: 22px; }
  .tab-item.active { color: var(--primary-light); }
  .tab-item:hover { color: var(--primary-light); }

  /* Ocean / Bottle List */
  .ocean-header {
    padding: 20px; text-align: center;
  }
  .ocean-title { font-size: 18px; font-weight: 600; margin-bottom: 4px; }
  .ocean-desc { font-size: 13px; color: var(--text-secondary); }
  .bottle-list { padding: 0 16px; display: flex; flex-direction: column; gap: 12px; }

  /* Bottle Card */
  .bottle-card {
    background: var(--bg-card); border-radius: var(--radius);
    padding: 18px; border: 1px solid var(--border);
    transition: all 0.2s; cursor: pointer;
    animation: card-in 0.4s ease-out;
  }
  @keyframes card-in {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .bottle-card:hover { border-color: var(--primary); background: var(--bg-card-hover); }
  .bottle-header { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
  .bottle-avatar {
    width: 38px; height: 38px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; flex-shrink: 0;
  }
  .bottle-avatar.anonymous {
    background: linear-gradient(135deg, #636e72, #2d3436);
  }
  .bottle-avatar.named {
    background: linear-gradient(135deg, var(--primary), var(--accent));
  }
  .bottle-meta { flex: 1; }
  .bottle-author { font-size: 14px; font-weight: 600; }
  .bottle-time { font-size: 11px; color: var(--text-muted); }
  .bottle-content { font-size: 15px; line-height: 1.6; margin-bottom: 14px; word-break: break-word; }
  .bottle-footer { display: flex; align-items: center; gap: 16px; }
  .bottle-action {
    display: flex; align-items: center; gap: 5px;
    border: none; background: none; color: var(--text-secondary);
    font-size: 13px; cursor: pointer; padding: 4px 8px;
    border-radius: var(--radius-xs); transition: all 0.2s;
  }
  .bottle-action:hover { background: rgba(108,92,231,0.15); color: var(--primary-light); }
  .bottle-action.liked { color: var(--danger); }
  .bottle-action .action-icon { font-size: 16px; }
  .bottle-tag {
    font-size: 11px; padding: 2px 8px; border-radius: 10px;
    background: rgba(108,92,231,0.15); color: var(--primary-light);
  }
  .bottle-tag.admin-tag { background: rgba(0,184,148,0.15); color: var(--success); }

  /* Send Bottle */
  .send-page { padding: 20px; }
  .send-title { font-size: 20px; font-weight: 700; margin-bottom: 20px; }
  .send-area {
    width: 100%; min-height: 200px; padding: 16px;
    border-radius: var(--radius); border: 1px solid var(--border);
    background: var(--bg-input); color: var(--text);
    font-size: 15px; line-height: 1.6; resize: vertical;
    outline: none; font-family: inherit;
    transition: border-color 0.2s;
  }
  .send-area:focus { border-color: var(--primary); }
  .send-area::placeholder { color: var(--text-muted); }
  .send-options {
    display: flex; align-items: center; justify-content: space-between;
    margin-top: 16px; flex-wrap: wrap; gap: 12px;
  }
  .toggle-group { display: flex; align-items: center; gap: 10px; }
  .toggle-label { font-size: 14px; color: var(--text-secondary); }
  .toggle {
    width: 48px; height: 26px; border-radius: 13px;
    background: var(--border); position: relative;
    cursor: pointer; transition: background 0.3s;
  }
  .toggle.active { background: var(--primary); }
  .toggle::after {
    content: ''; position: absolute; top: 3px; left: 3px;
    width: 20px; height: 20px; border-radius: 50%;
    background: white; transition: transform 0.3s;
  }
  .toggle.active::after { transform: translateX(22px); }
  .char-count { font-size: 12px; color: var(--text-muted); }
  .char-count.warn { color: var(--warning); }
  .char-count.over { color: var(--danger); }
  .send-btn-wrap { margin-top: 20px; }

  /* My Bottles */
  .my-page { padding: 20px; }
  .my-title { font-size: 20px; font-weight: 700; margin-bottom: 4px; }
  .my-desc { font-size: 13px; color: var(--text-secondary); margin-bottom: 20px; }
  .filter-tabs { display: flex; gap: 8px; margin-bottom: 16px; }
  .filter-tab {
    padding: 6px 14px; border-radius: 20px; border: 1px solid var(--border);
    background: none; color: var(--text-secondary); font-size: 13px;
    cursor: pointer; transition: all 0.2s;
  }
  .filter-tab.active { background: var(--primary); color: white; border-color: var(--primary); }

  /* Detail / Reply */
  .detail-overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.6); z-index: 200;
    display: none; align-items: flex-end; justify-content: center;
  }
  .detail-overlay.active { display: flex; }
  .detail-panel {
    width: 100%; max-width: 480px; max-height: 85vh;
    background: var(--bg); border-radius: 20px 20px 0 0;
    display: flex; flex-direction: column;
    animation: slide-up 0.3s ease-out;
  }
  @keyframes slide-up {
    from { transform: translateY(100%); }
    to { transform: translateY(0); }
  }
  .detail-header {
    padding: 16px 20px; display: flex; align-items: center;
    justify-content: space-between; border-bottom: 1px solid var(--border);
  }
  .detail-header-title { font-size: 16px; font-weight: 600; }
  .detail-body { flex: 1; overflow-y: auto; padding: 20px; }
  .detail-bottle { margin-bottom: 20px; }
  .reply-list { display: flex; flex-direction: column; gap: 12px; }
  .reply-item {
    padding: 14px; border-radius: var(--radius-sm);
    background: var(--bg-card); border: 1px solid var(--border);
  }
  .reply-header { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
  .reply-avatar {
    width: 28px; height: 28px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px;
  }
  .reply-avatar.anonymous { background: linear-gradient(135deg, #636e72, #2d3436); }
  .reply-avatar.named { background: linear-gradient(135deg, var(--primary), var(--accent)); }
  .reply-author { font-size: 13px; font-weight: 600; }
  .reply-time { font-size: 11px; color: var(--text-muted); }
  .reply-content { font-size: 14px; line-height: 1.5; }
  .reply-actions { display: flex; gap: 12px; margin-top: 8px; }
  .detail-footer {
    padding: 12px 20px; border-top: 1px solid var(--border);
    display: flex; gap: 10px;
    padding-bottom: max(12px, env(safe-area-inset-bottom));
  }
  .reply-input {
    flex: 1; padding: 10px 14px; border-radius: 20px;
    border: 1px solid var(--border); background: var(--bg-input);
    color: var(--text); font-size: 14px; outline: none;
  }
  .reply-input:focus { border-color: var(--primary); }
  .reply-send-btn {
    width: 40px; height: 40px; border-radius: 50%;
    border: none; background: var(--primary);
    color: white; font-size: 18px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s;
  }
  .reply-send-btn:hover { background: var(--primary-dark); transform: scale(1.05); }

  /* Admin Panel */
  .admin-page { padding: 20px; }
  .admin-title { font-size: 20px; font-weight: 700; margin-bottom: 4px; }
  .admin-desc { font-size: 13px; color: var(--text-secondary); margin-bottom: 20px; }
  .admin-section {
    background: var(--bg-card); border-radius: var(--radius);
    padding: 18px; margin-bottom: 16px; border: 1px solid var(--border);
  }
  .admin-section-title {
    font-size: 15px; font-weight: 600; margin-bottom: 14px;
    display: flex; align-items: center; gap: 8px;
  }
  .word-list { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 14px; }
  .word-tag {
    display: flex; align-items: center; gap: 6px;
    padding: 5px 12px; border-radius: 16px;
    background: rgba(255,107,107,0.12); color: var(--danger-light);
    font-size: 13px;
  }
  .word-tag .remove-word {
    cursor: pointer; font-size: 15px; opacity: 0.7;
    transition: opacity 0.2s;
  }
  .word-tag .remove-word:hover { opacity: 1; }
  .add-word-row { display: flex; gap: 8px; }
  .add-word-input {
    flex: 1; padding: 8px 12px; border-radius: var(--radius-xs);
    border: 1px solid var(--border); background: var(--bg-input);
    color: var(--text); font-size: 13px; outline: none;
  }
  .add-word-input:focus { border-color: var(--primary); }
  .admin-stat { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid var(--border); }
  .admin-stat:last-child { border-bottom: none; }
  .stat-label { color: var(--text-secondary); font-size: 14px; }
  .stat-value { font-weight: 600; color: var(--primary-light); }
  .reported-list { display: flex; flex-direction: column; gap: 10px; }
  .reported-item {
    padding: 12px; border-radius: var(--radius-sm);
    background: var(--bg-input); border: 1px solid var(--border);
  }
  .reported-content { font-size: 14px; margin-bottom: 8px; }
  .reported-actions { display: flex; gap: 8px; }

  /* Profile Page */
  .profile-page { padding: 20px; }
  .profile-card {
    background: var(--bg-card); border-radius: var(--radius);
    padding: 24px; text-align: center; margin-bottom: 20px;
    border: 1px solid var(--border);
  }
  .profile-avatar {
    width: 72px; height: 72px; border-radius: 50%;
    background: linear-gradient(135deg, var(--primary), var(--accent));
    display: flex; align-items: center; justify-content: center;
    font-size: 36px; margin: 0 auto 12px;
  }
  .profile-name { font-size: 18px; font-weight: 700; margin-bottom: 4px; }
  .profile-role { font-size: 13px; color: var(--text-secondary); margin-bottom: 16px; }
  .profile-stats { display: flex; justify-content: center; gap: 32px; }
  .profile-stat { text-align: center; }
  .profile-stat-num { font-size: 20px; font-weight: 700; color: var(--primary-light); }
  .profile-stat-label { font-size: 12px; color: var(--text-muted); }
  .profile-actions { margin-top: 20px; display: flex; flex-direction: column; gap: 10px; }
  .profile-action-btn {
    width: 100%; padding: 12px; border-radius: var(--radius-sm);
    border: 1px solid var(--border); background: var(--bg-card);
    color: var(--text); font-size: 14px; cursor: pointer;
    display: flex; align-items: center; justify-content: space-between;
    transition: all 0.2s;
  }
  .profile-action-btn:hover { border-color: var(--primary); }
  .profile-action-btn.danger { color: var(--danger); }

  /* Toast */
  .toast-container {
    position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
    z-index: 999; display: flex; flex-direction: column; gap: 8px;
    pointer-events: none;
  }
  .toast {
    padding: 12px 20px; border-radius: var(--radius-sm);
    background: var(--glass); backdrop-filter: blur(20px);
    border: 1px solid var(--border); color: var(--text);
    font-size: 14px; animation: toast-in 0.3s ease-out;
    pointer-events: auto; white-space: nowrap;
  }
  .toast.success { border-color: var(--success); }
  .toast.error { border-color: var(--danger); }
  .toast.warning { border-color: var(--warning); }
  @keyframes toast-in {
    from { opacity: 0; transform: translateY(-10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* Empty State */
  .empty-state {
    text-align: center; padding: 60px 20px; color: var(--text-muted);
  }
  .empty-icon { font-size: 48px; margin-bottom: 12px; }
  .empty-text { font-size: 15px; }

  /* Modal */
  .modal-overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.6); z-index: 300;
    display: none; align-items: center; justify-content: center;
    padding: 20px;
  }
  .modal-overlay.active { display: flex; }
  .modal {
    background: var(--bg-card); border-radius: var(--radius);
    padding: 24px; width: 100%; max-width: 360px;
    border: 1px solid var(--border);
    animation: modal-in 0.3s ease-out;
  }
  @keyframes modal-in {
    from { opacity: 0; transform: scale(0.9); }
    to { opacity: 1; transform: scale(1); }
  }
  .modal-title { font-size: 18px; font-weight: 700; margin-bottom: 12px; }
  .modal-text { font-size: 14px; color: var(--text-secondary); margin-bottom: 20px; line-height: 1.5; }
  .modal-actions { display: flex; gap: 10px; }
  .modal-actions .btn { flex: 1; }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  /* Responsive */
  @media (min-width: 481px) {
    .app { border-left: 1px solid var(--border); border-right: 1px solid var(--border); }
  }

  /* Admin badge */
  .admin-badge {
    display: inline-flex; align-items: center; gap: 4px;
    padding: 2px 8px; border-radius: 10px;
    background: rgba(0,184,148,0.15); color: var(--success);
    font-size: 11px; font-weight: 600;
  }

  /* Blocked notice */
  .blocked-notice {
    padding: 12px 16px; border-radius: var(--radius-sm);
    background: rgba(255,107,107,0.1); border: 1px solid rgba(255,107,107,0.2);
    color: var(--danger-light); font-size: 13px; margin-bottom: 16px;
    display: none;
  }
  .blocked-notice.show { display: block; }

  /* User management */
  .user-item {
    display: flex; align-items: center; gap: 12px;
    padding: 12px; border-radius: var(--radius-sm);
    background: var(--bg-input); margin-bottom: 8px;
  }
  .user-item-avatar {
    width: 36px; height: 36px; border-radius: 50%;
    background: linear-gradient(135deg, var(--primary), var(--accent));
    display: flex; align-items: center; justify-content: center;
    font-size: 16px; flex-shrink: 0;
  }
  .user-item-info { flex: 1; }
  .user-item-name { font-size: 14px; font-weight: 600; }
  .user-item-meta { font-size: 11px; color: var(--text-muted); }

  /* Loading state */
  .loading { display: flex; align-items: center; justify-content: center; padding: 40px; color: var(--text-secondary); }
</style>
</head>
<body>

<!-- Background Bubbles -->
<div class="bg-ocean" id="bgOcean"></div>

<!-- Toast Container -->
<div class="toast-container" id="toastContainer"></div>

<!-- App -->
<div class="app" id="app">

  <!-- Login Page -->
  <div class="login-page page active" id="loginPage">
    <div class="login-logo">🫧</div>
    <div class="login-title">漂流瓶</div>
    <div class="login-subtitle">匿名倾诉，温暖回应<br>把心事装进瓶子，投向大海</div>
    <div class="login-form">
      <div class="form-group">
        <label class="form-label">昵称</label>
        <input class="form-input" id="loginName" placeholder="给自己取个名字吧" maxlength="12">
      </div>
      <div class="form-group">
        <label class="form-label">密码</label>
        <input class="form-input" id="loginPass" type="password" placeholder="设置登录密码" maxlength="20">
      </div>
      <div class="form-group" style="margin-top:20px">
        <button class="btn btn-primary" id="loginBtn" onclick="handleLogin()">登录 / 注册</button>
      </div>
      <div style="text-align:center;margin-top:16px">
        <span style="font-size:12px;color:var(--text-muted)">首次输入将自动创建账号</span>
      </div>
    </div>
  </div>

  <!-- Main Content (hidden until login) -->
  <div id="mainContent" style="display:none;flex:1;display:none;flex-direction:column">
    <!-- Header -->
    <div class="header">
      <div class="header-title">🫧 漂流瓶</div>
      <div class="header-actions">
        <button class="icon-btn" onclick="switchTab('profile')" title="我的">👤</button>
      </div>

<script>
// ==================== SUPABASE CONFIG ====================
// 请替换为您自己的 Supabase 项目凭证
const SUPABASE_URL = 'https://mhnieopqfsqhwziuaxsa.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1obmllb3BxZnNxaHd6aXVheHNhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk3ODUxMTYsImV4cCI6MjA5NTM2MTExNn0.-OrZXR9mjI2b9UWavkE2vebOi9OIQCE4uHM';

const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// ==================== STATE ====================
let currentUser = null;
let currentTab = 'ocean';
let currentDetailBottle = null;
let myFilter = 'sent';
let isAnon = true;
let usersCache = {};
let adminsCache = [];

// ==================== INIT ====================
async function init() {
  createBubbles();
  
  // Check session
  const session = localStorage.getItem('drift_session');
  if (session) {
    const sessionData = JSON.parse(session);
    const { data: user } = await supabase
      .from('users')
      .select('*')
      .eq('name', sessionData.name)
      .single();
    if (user) {
      currentUser = sessionData;
      usersCache[user.name] = user;
      await loadAdmins();
      enterApp();
    }
  }
  
  // Load users cache
  await loadUsersCache();
}

async function loadUsersCache() {
  const { data } = await supabase.from('users').select('*');
  if (data) {
    data.forEach(u => usersCache[u.name] = u);
  }
}

async function loadAdmins() {
  const { data } = await supabase.from('admin_accounts').select('name');
  if (data) {
    adminsCache = data.map(d => d.name);
  }
}

init();

// ==================== AUTH ====================
async function handleLogin() {
  const name = document.getElementById('loginName').value.trim();
  const pass = document.getElementById('loginPass').value;
  if (!name) return toast('请输入昵称', 'error');
  if (!pass) return toast('请输入密码', 'error');
  if (name.length < 2) return toast('昵称至少2个字符', 'error');
  if (pass.length < 3) return toast('密码至少3个字符', 'error');

  // Check if user exists
  const { data: existingUser } = await supabase
    .from('users')
    .select('*')
    .eq('name', name)
    .single();

  if (existingUser) {
    if (existingUser.password !== pass) return toast('密码错误', 'error');
    usersCache[name] = existingUser;
  } else {
    // Create new user
    const avatar = getRandomEmoji();
    const { data: newUser, error } = await supabase
      .from('users')
      .insert({ name, password: pass, avatar })
      .select()
      .single();
    
    if (error) {
      if (error.code === '23505') return toast('该昵称已被使用', 'error');
      return toast('注册失败', 'error');
    }
    usersCache[name] = newUser;
  }
  
  currentUser = { name };
  localStorage.setItem('drift_session', JSON.stringify(currentUser));
  await loadAdmins();
  enterApp();
  toast('欢迎回来，' + name + '！', 'success');
}

function handleLogout() {
  currentUser = null;
  localStorage.removeItem('drift_session');
  document.getElementById('mainContent').style.display = 'none';
  document.getElementById('loginPage').style.display = 'flex';
  document.getElementById('loginPage').classList.add('active');
  document.getElementById('loginName').value = '';
  document.getElementById('loginPass').value = '';
}

async function enterApp() {
  document.getElementById('loginPage').style.display = 'none';
  document.getElementById('loginPage').classList.remove('active');
  const mc = document.getElementById('mainContent');
  mc.style.display = 'flex';
  mc.style.flexDirection = 'column';
  mc.style.flex = '1';

  const isAdmin = adminsCache.includes(currentUser.name);
  document.getElementById('adminEntry').style.display = isAdmin ? 'flex' : 'none';

  updateProfile();
  await loadOcean();
  switchTab('ocean');
}

// ==================== TABS ====================
async function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active'));

  const pageMap = { ocean: 'oceanPage', send: 'sendPage', my: 'myPage', admin: 'adminPage', profile: 'profilePage' };
  const tabIdx = { ocean: 0, send: 1, my: 2, profile: 3 };

  if (pageMap[tab]) {
    document.getElementById(pageMap[tab]).classList.add('active');
  }
  if (tabIdx[tab] !== undefined) {
    document.querySelectorAll('.tab-item')[tabIdx[tab]].classList.add('active');
  }

  if (tab === 'ocean') await loadOcean();
  if (tab === 'my') await loadMyBottles();
  if (tab === 'admin') await loadAdmin();
  if (tab === 'profile') updateProfile();
}

// ==================== BOTTLES ====================
async function loadBlockedWords() {
  const { data } = await supabase.from('blocked_words').select('word');
  return data ? data.map(w => w.word) : [];
}

async function sendBottle() {
  const content = document.getElementById('sendContent').value.trim();
  if (!content) return toast('请写点什么吧~', 'warning');
  if (content.length < 5) return toast('内容太短了，至少写5个字', 'warning');

  // Check blocked words
  const blocked = await loadBlockedWords();
  const found = blocked.find(w => content.includes(w));
  if (found) {
    document.getElementById('sendBlockedNotice').classList.add('show');
    toast('内容包含敏感词，请修改', 'error');
    return;
  }
  document.getElementById('sendBlockedNotice').classList.remove('show');

  const { error } = await supabase
    .from('bottles')
    .insert({
      author_name: isAnon ? null : currentUser.name,
      content,
      is_anon: isAnon,
      likes: [],
      reports: [],
      deleted: false
    });

  if (error) return toast('发送失败', 'error');

  document.getElementById('sendContent').value = '';
  updateCharCount();
  toast('漂流瓶已投入大海~ 🫧', 'success');
  await switchTab('ocean');
}

async function loadOcean() {
  const { data: bottles, error } = await supabase
    .from('bottles')
    .select('*, replies(id)')
    .eq('deleted', false)
    .order('created_at', { ascending: false });

  const list = document.getElementById('oceanList');

  if (error || !bottles || bottles.length === 0) {
    list.innerHTML = '<div class="empty-state"><div class="empty-icon">🌊</div><div class="empty-text">大海空空如也，去扔一个瓶子吧~</div></div>';
    return;
  }

  list.innerHTML = bottles.map(b => renderBottleCard(b)).join('');
}

async function loadRepliesForBottle(bottleId) {
  const { data: replies } = await supabase
    .from('replies')
    .select('*')
    .eq('bottle_id', bottleId)
    .order('created_at', { ascending: true });
  return replies || [];
}

function renderBottleCard(b) {
  const user = usersCache[b.author_name];
  const isAnonBottle = b.is_anon || !b.author_name;
  const authorName = isAnonBottle ? '匿名用户' : b.author_name;
  const avatarEmoji = isAnonBottle ? '🎭' : (user?.avatar || '😊');
  const avatarClass = isAnonBottle ? 'anonymous' : 'named';
  const liked = b.likes && b.likes.includes(currentUser?.name);
  const isAdmin = currentUser && adminsCache.includes(currentUser.name);
  const timeStr = formatTime(new Date(b.created_at).getTime());
  const replyCount = b.replies ? b.replies.length : 0;

  return `
    <div class="bottle-card" onclick="openDetail('${b.id}')">
      <div class="bottle-header">
        <div class="bottle-avatar ${avatarClass}">${avatarEmoji}</div>
        <div class="bottle-meta">
          <div class="bottle-author">${escHtml(authorName)} ${isAnonBottle ? '<span class="bottle-tag">匿名</span>' : ''}</div>
          <div class="bottle-time">${timeStr}</div>
        </div>
      </div>
      <div class="bottle-content">${escHtml(b.content)}</div>
      <div class="bottle-footer">
        <button class="bottle-action ${liked ? 'liked' : ''}" onclick="event.stopPropagation();toggleLike('${b.id}')">
          <span class="action-icon">${liked ? '❤️' : '🤍'}</span>
          <span>${b.likes ? b.likes.length : 0}</span>
        </button>
        <button class="bottle-action" onclick="event.stopPropagation();openDetail('${b.id}')">
          <span class="action-icon">💬</span>
          <span>${replyCount}</span>
        </button>
        ${isAdmin ? `<button class="bottle-action" onclick="event.stopPropagation();deleteBottle('${b.id}')">
          <span class="action-icon">🗑️</span>
        </button>` : ''}
        <button class="bottle-action" onclick="event.stopPropagation();reportBottle('${b.id}')" style="margin-left:auto">
          <span class="action-icon">🚩</span>
        </button>
      </div>
    </div>
  `;
}

async function toggleLike(bottleId) {
  if (!currentUser) return;
  
  const { data: bottle } = await supabase
    .from('bottles')
    .select('likes')
    .eq('id', bottleId)
    .single();
  
  if (!bottle) return;
  
  let likes = bottle.likes || [];
  const idx = likes.indexOf(currentUser.name);
  if (idx >= 0) likes.splice(idx, 1);
  else likes.push(currentUser.name);

  await supabase
    .from('bottles')
    .update({ likes })
    .eq('id', bottleId);
  
  if (currentTab === 'ocean') await loadOcean();
  if (currentTab === 'my') await loadMyBottles();
  if (currentDetailBottle === bottleId) await openDetail(bottleId);
}

async function reportBottle(bottleId) {
  if (!currentUser) return;
  showModal('举报漂流瓶', '确定要举报这个漂流瓶吗？管理员会审核处理。', async () => {
    const { data: bottle } = await supabase
      .from('bottles')
      .select('reports')
      .eq('id', bottleId)
      .single();
    
    if (!bottle) return;
    
    let reports = bottle.reports || [];
    if (!reports.includes(currentUser.name)) {
      reports.push(currentUser.name);
      await supabase
        .from('bottles')
        .update({ reports })
        .eq('id', bottleId);
      toast('已举报，感谢你的反馈', 'success');
    } else {
      toast('你已经举报过了', 'warning');
    }
  });
}

async function deleteBottle(bottleId) {
  showModal('删除漂流瓶', '确定要删除这个漂流瓶吗？此操作不可恢复。', async () => {
    await supabase
      .from('bottles')
      .update({ deleted: true })
      .eq('id', bottleId);
    toast('已删除', 'success');
    await loadOcean();
    closeDetail();
  });
}

// ==================== DETAIL / REPLIES ====================
async function openDetail(bottleId) {
  const { data: bottle } = await supabase
    .from('bottles')
    .select('*')
    .eq('id', bottleId)
    .single();
  
  if (!bottle) return;
  
  currentDetailBottle = bottleId;

  const user = usersCache[bottle.author_name];
  const isAnonBottle = bottle.is_anon || !bottle.author_name;
  const authorName = isAnonBottle ? '匿名用户' : bottle.author_name;
  const avatarEmoji = isAnonBottle ? '🎭' : (user?.avatar || '😊');
  const avatarClass = isAnonBottle ? 'anonymous' : 'named';
  const liked = bottle.likes && bottle.likes.includes(currentUser?.name);
  
  const replies = await loadRepliesForBottle(bottleId);
  
  let repliesHtml = '';
  if (replies.length === 0) {
    repliesHtml = '<div class="empty-state" style="padding:30px"><div class="empty-icon">💬</div><div class="empty-text">还没有回复，来做第一个吧~</div></div>';
  } else {
    repliesHtml = replies.map(r => {
      const rUser = usersCache[r.author_name];
      const rAnon = r.is_anon || !r.author_name;
      const rName = rAnon ? '匿名用户' : r.author_name;
      const rEmoji = rAnon ? '🎭' : (rUser?.avatar || '😊');
      const rClass = rAnon ? 'anonymous' : 'named';
      const rLiked = r.likes && r.likes.includes(currentUser?.name);
      return `
        <div class="reply-item">
          <div class="reply-header">
            <div class="reply-avatar ${rClass}">${rEmoji}</div>
            <span class="reply-author">${escHtml(rName)}</span>
            <span class="reply-time">${formatTime(new Date(r.created_at).getTime())}</span>
          </div>
          <div class="reply-content">${escHtml(r.content)}</div>
          <div class="reply-actions">
            <button class="bottle-action ${rLiked ? 'liked' : ''}" onclick="toggleReplyLike('${bottleId}','${r.id}')">
              <span class="action-icon">${rLiked ? '❤️' : '🤍'}</span>
              <span>${r.likes ? r.likes.length : 0}</span>
            </button>
          </div>
        </div>
      `;
    }).join('');
  }

  document.getElementById('detailBody').innerHTML = `
    <div class="detail-bottle">
      <div class="bottle-header">
        <div class="bottle-avatar ${avatarClass}">${avatarEmoji}</div>
        <div class="bottle-meta">
          <div class="bottle-author">${escHtml(authorName)} ${isAnonBottle ? '<span class="bottle-tag">匿名</span>' : ''}</div>
          <div class="bottle-time">${formatTime(new Date(bottle.created_at).getTime())}</div>
        </div>
      </div>
      <div class="bottle-content">${escHtml(bottle.content)}</div>
      <div class="bottle-footer">
        <button class="bottle-action ${liked ? 'liked' : ''}" onclick="toggleLike('${bottleId}')">
          <span class="action-icon">${liked ? '❤️' : '🤍'}</span>
          <span>${bottle.likes ? bottle.likes.length : 0}</span>
        </button>
        <span class="bottle-action">
          <span class="action-icon">💬</span>
          <span>${replies.length} 回复</span>
        </span>
      </div>
    </div>
    <div style="font-size:14px;font-weight:600;margin-bottom:12px;color:var(--text-secondary)">💬 回复 (${replies.length})</div>
    <div class="reply-list">${repliesHtml}</div>
  `;

  document.getElementById('detailOverlay').classList.add('active');
}

function closeDetail() {
  document.getElementById('detailOverlay').classList.remove('active');
  currentDetailBottle = null;
}

async function sendReply() {
  if (!currentDetailBottle || !currentUser) return;
  const input = document.getElementById('replyInput');
  const content = input.value.trim();
  if (!content) return toast('请输入回复内容', 'warning');
  if (content.length < 2) return toast('回复至少2个字符', 'warning');

  // Check blocked words
  const blocked = await loadBlockedWords();
  const found = blocked.find(w => content.includes(w));
  if (found) return toast('回复包含敏感词，请修改', 'error');

  const { error } = await supabase
    .from('replies')
    .insert({
      bottle_id: currentDetailBottle,
      author_name: isAnon ? null : currentUser.name,
      content,
      is_anon: isAnon,
      likes: []
    });

  if (error) return toast('回复失败', 'error');
  
  input.value = '';
  await openDetail(currentDetailBottle);
  toast('回复成功~', 'success');
}

async function toggleReplyLike(bottleId, replyId) {
  if (!currentUser) return;
  
  const { data: reply } = await supabase
    .from('replies')
    .select('likes')
    .eq('id', replyId)
    .single();
  
  if (!reply) return;
  
  let likes = reply.likes || [];
  const idx = likes.indexOf(currentUser.name);
  if (idx >= 0) likes.splice(idx, 1);
  else likes.push(currentUser.name);

  await supabase
    .from('replies')
    .update({ likes })
    .eq('id', replyId);
  
  await openDetail(bottleId);
}

function filterMy(type, el) {
  myFilter = type;
  document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
  if (el) el.classList.add('active');
  loadMyBottles();
}

async function loadMyBottles() {
  if (!currentUser) return;
  
  const { data: bottles, error } = await supabase
    .from('bottles')
    .select('*, replies(id)')
    .eq('deleted', false)
    .order('created_at', { ascending: false });

  if (error || !bottles) {
    document.getElementById('myList').innerHTML = '<div class="empty-state"><div class="empty-icon">📭</div><div class="empty-text">暂无记录</div></div>';
    return;
  }
  
  let filtered = [];
  
  if (myFilter === 'sent') {
    filtered = bottles.filter(b => b.author_name === currentUser.name);
  } else if (myFilter === 'replied') {
    const { data: myReplies } = await supabase
      .from('replies')
      .select('bottle_id')
      .eq('author_name', currentUser.name);
    
    const repliedBottleIds = [...new Set((myReplies || []).map(r => r.bottle_id))];
    filtered = bottles.filter(b => repliedBottleIds.includes(b.id));
  } else if (myFilter === 'liked') {
    filtered = bottles.filter(b => b.likes && b.likes.includes(currentUser.name));
  }

  const list = document.getElementById('myList');
  if (filtered.length === 0) {
    list.innerHTML = '<div class="empty-state"><div class="empty-icon">📭</div><div class="empty-text">暂无记录</div></div>';
    return;
  }
  list.innerHTML = filtered.map(b => renderBottleCard(b)).join('');
}

// ==================== ADMIN ====================
async function loadAdmin() {
  if (!currentUser || !adminsCache.includes(currentUser.name)) {
    document.getElementById('adminPage').innerHTML = '<div class="empty-state"><div class="empty-icon">🔒</div><div class="empty-text">仅管理员可访问</div></div>';
    return;
  }

  // Stats
  const { data: bottles } = await supabase
    .from('bottles')
    .select('*, replies(id)')
    .eq('deleted', false);
  
  const { data: users } = await supabase.from('users').select('*');
  const { data: allReplies } = await supabase.from('replies').select('id');
  
  const activeBottles = bottles || [];
  const today = new Date();
  today.setHours(0, 0, 0, 0);
  const todayCount = activeBottles.filter(b => new Date(b.created_at) >= today).length;
  const totalReplies = activeBottles.reduce((s, b) => s + (b.replies ? b.replies.length : 0), 0);

  document.getElementById('statTotal').textContent = activeBottles.length;
  document.getElementById('statToday').textContent = todayCount;
  document.getElementById('statUsers').textContent = (users || []).length;
  document.getElementById('statReplies').textContent = totalReplies;

  // Blocked words
  const { data: blockedWords } = await supabase.from('blocked_words').select('word').order('created_at', { ascending: true });
  document.getElementById('wordList').innerHTML = (blockedWords || []).map(w => `
    <div class="word-tag">${escHtml(w.word)}<span class="remove-word" onclick="removeBlockedWord('${escAttr(w.word)}')">✕</span></div>
  `).join('');

  // Users
  document.getElementById('userList').innerHTML = (users || []).map(u => {
    const isAdmin = adminsCache.includes(u.name);
    return `
      <div class="user-item">
        <div class="user-item-avatar">${u.avatar || '😊'}</div>
        <div class="user-item-info">
          <div class="user-item-name">${escHtml(u.name)} ${isAdmin ? '<span class="admin-badge">管理员</span>' : ''}</div>
          <div class="user-item-meta">注册于 ${formatTime(new Date(u.created_at).getTime())}</div>
        </div>
        ${!isAdmin && u.name !== 'admin' ? `<button class="btn btn-sm ${isAdmin ? 'btn-secondary' : 'btn-primary'}" onclick="toggleAdmin('${escAttr(u.name)}')">${isAdmin ? '取消管理' : '设为管理'}</button>` : ''}
      </div>
    `;
  }).join('');

  // Reported
  const reported = activeBottles.filter(b => b.reports && b.reports.length > 0);
  if (reported.length === 0) {
    document.getElementById('reportedList').innerHTML = '<div style="color:var(--text-muted);font-size:13px;padding:10px">暂无举报</div>';
  } else {
    document.getElementById('reportedList').innerHTML = reported.map(b => `
      <div class="reported-item">
        <div class="reported-content">${escHtml(b.content.substring(0, 80))}${b.content.length > 80 ? '...' : ''}</div>
        <div style="font-size:12px;color:var(--text-muted);margin-bottom:8px">🚩 ${b.reports.length} 次举报 · ${formatTime(new Date(b.created_at).getTime())}</div>
        <div class="reported-actions">
          <button class="btn btn-sm btn-danger" onclick="deleteBottle('${b.id}');loadAdmin()">删除</button>
          <button class="btn btn-sm btn-secondary" onclick="clearReports('${b.id}')">忽略</button>
        </div>
      </div>
    `).join('');
  }
}

async function addBlockedWord() {
  const input = document.getElementById('newWordInput');
  const word = input.value.trim();
  if (!word) return;
  
  const { error } = await supabase
    .from('blocked_words')
    .insert({ word });
  
  if (error) {
    if (error.code === '23505') return toast('该屏蔽词已存在', 'warning');
    return toast('添加失败', 'error');
  }
  
  input.value = '';
  await loadAdmin();
  toast('已添加屏蔽词', 'success');
}

async function removeBlockedWord(word) {
  await supabase
    .from('blocked_words')
    .delete()
    .eq('word', word);
  
  await loadAdmin();
  toast('已移除屏蔽词', 'success');
}

async function toggleAdmin(name) {
  const isAdmin = adminsCache.includes(name);
  
  if (isAdmin) {
    await supabase
      .from('admin_accounts')
      .delete()
      .eq('name', name);
    toast(`已取消 ${name} 的管理员权限`, 'success');
  } else {
    if (adminsCache.length >= 3) return toast('最多设置3个管理员', 'warning');
    await supabase
      .from('admin_accounts')
      .insert({ name });
    toast(`已将 ${name} 设为管理员`, 'success');
  }
  
  await loadAdmins();
  await loadAdmin();
  
  // Update current user's admin status
  if (currentUser) {
    const isCurrentAdmin = adminsCache.includes(currentUser.name);
    document.getElementById('adminEntry').style.display = isCurrentAdmin ? 'flex' : 'none';
  }
}

async function clearReports(bottleId) {
  await supabase
    .from('bottles')
    .update({ reports: [] })
    .eq('id', bottleId);
  
  await loadAdmin();
  toast('已忽略举报', 'success');
}

// ==================== PROFILE ====================
async function updateProfile() {
  if (!currentUser) return;
  
  const user = usersCache[currentUser.name];
  const isAdmin = adminsCache.includes(currentUser.name);

  document.getElementById('profileAvatar').textContent = user?.avatar || '😊';
  document.getElementById('profileName').textContent = currentUser.name;
  document.getElementById('profileRole').textContent = isAdmin ? '🛡️ 管理员' : '普通用户';
  document.getElementById('adminEntry').style.display = isAdmin ? 'flex' : 'none';

  const { data: bottles } = await supabase
    .from('bottles')
    .select('*, replies(author_name)')
    .eq('deleted', false);
  
  if (!bottles) {
    document.getElementById('pStatSent').textContent = '0';
    document.getElementById('pStatReply').textContent = '0';
    document.getElementById('pStatLike').textContent = '0';
    return;
  }
  
  document.getElementById('pStatSent').textContent = bottles.filter(b => b.author_name === currentUser.name).length;
  document.getElementById('pStatReply').textContent = bottles.reduce((s, b) => 
    s + (b.replies ? b.replies.filter(r => r.author_name === currentUser.name).length : 0), 0);
  document.getElementById('pStatLike').textContent = bottles.reduce((s, b) => 
    s + (b.likes && b.likes.includes(currentUser.name) ? 1 : 0), 0);
}

function showEditName() {
  const modal = document.getElementById('modalContent');
  modal.innerHTML = `
    <div class="modal-title">修改昵称</div>
    <input class="form-input" id="editNameInput" value="${escAttr(currentUser.name)}" maxlength="12" style="margin-bottom:16px">
    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="closeModal()">取消</button>
      <button class="btn btn-primary" onclick="doEditName()">确认</button>
    </div>
  `;
  document.getElementById('modalOverlay').classList.add('active');
}

async function doEditName() {
  const newName = document.getElementById('editNameInput').value.trim();
  if (!newName || newName.length < 2) return toast('昵称至少2个字符', 'error');

  // Check if new name exists
  const { data: existing } = await supabase
    .from('users')
    .select('name')
    .eq('name', newName)
    .single();
  
  if (existing && newName !== currentUser.name) return toast('该昵称已被使用', 'error');

  const oldName = currentUser.name;
  
  // Update user name
  await supabase
    .from('users')
    .update({ name: newName, updated_at: new Date().toISOString() })
    .eq('name', oldName);
  
  // Update bottles author
  await supabase
    .from('bottles')
    .update({ author_name: newName })
    .eq('author_name', oldName);
  
  // Update replies author
  await supabase
    .from('replies')
    .update({ author_name: newName })
    .eq('author_name', oldName);
  
  // Update admin
  if (adminsCache.includes(oldName)) {
    await supabase
      .from('admin_accounts')
      .delete()
      .eq('name', oldName);
    await supabase
      .from('admin_accounts')
      .insert({ name: newName });
  }

  currentUser.name = newName;
  localStorage.setItem('drift_session', JSON.stringify(currentUser));
  
  // Reload caches
  await loadUsersCache();
  await loadAdmins();
  
  closeModal();
  updateProfile();
  toast('昵称修改成功', 'success');
}

// ==================== MODAL ====================
function showModal(title, text, onConfirm) {
  const modal = document.getElementById('modalContent');
  modal.innerHTML = `
    <div class="modal-title">${title}</div>
    <div class="modal-text">${text}</div>
    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="closeModal()">取消</button>
      <button class="btn btn-primary" id="modalConfirmBtn">确认</button>
    </div>
  `;
  document.getElementById('modalConfirmBtn').onclick = () => { closeModal(); onConfirm(); };
  document.getElementById('modalOverlay').classList.add('active');
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('active');
}

// ==================== TOAST ====================
function toast(msg, type = '') {
  const container = document.getElementById('toastContainer');
  const el = document.createElement('div');
  el.className = 'toast ' + type;
  el.textContent = msg;
  container.appendChild(el);
  setTimeout(() => { el.style.opacity = '0'; setTimeout(() => el.remove(), 300); }, 2500);
}

// ==================== UTILS ====================
function escHtml(str) {
  if (!str) return '';
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

function escAttr(str) {
  return str.replace(/"/g, '&quot;').replace(/'/g, '&#39;');
}

function formatTime(ts) {
  if (!ts) return '';
  const d = new Date(ts);
  const now = new Date();
  const diff = now - d;
  if (diff < 60000) return '刚刚';
  if (diff < 3600000) return Math.floor(diff / 60000) + '分钟前';
  if (diff < 86400000) return Math.floor(diff / 3600000) + '小时前';
  if (diff < 604800000) return Math.floor(diff / 86400000) + '天前';
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}

function getRandomEmoji() {
  const emojis = ['😊','😄','🥰','😎','🤗','🦊','🐱','🐶','🐼','🦄','🌸','🍀','⭐','🌙','🔥','💎','🎨','🎵','🌈','🦋'];
  return emojis[Math.floor(Math.random() * emojis.length)];
}

function createBubbles() {
  const ocean = document.getElementById('bgOcean');
  for (let i = 0; i < 15; i++) {
    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    const size = Math.random() * 80 + 20;
    bubble.style.width = size + 'px';
    bubble.style.height = size + 'px';
    bubble.style.left = Math.random() * 100 + '%';
    bubble.style.animationDuration = (Math.random() * 15 + 10) + 's';
    bubble.style.animationDelay = (Math.random() * 10) + 's';
    ocean.appendChild(bubble);
  }
}
